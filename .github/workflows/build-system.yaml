name: "Build & Cache NixOS System"

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  # ---------------------------------------------------------
  # STAGE 1: The "Scout" - Discover all NixOS Configurations
  # ---------------------------------------------------------
  generate-matrix:
    name: "Discover Fleet Matrix"
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Init submodules (skip nix-secrets)
        run: |
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git -c submodule."nix-secrets".update=none submodule update --init --recursive

      - name: Set up dummy secrets
        run: ./scripts/write-dummy-secrets.sh

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22

      - name: Set Nix input overrides
        run: |
          echo "NIX_OVERRIDES=\
            --override-input nix-secrets /tmp/dummy-secrets \
            --override-input nix-config git+file://$GITHUB_WORKSPACE/nix-config \
            --override-input nix-devshells git+file://$GITHUB_WORKSPACE/nix-devshells \
            --override-input nix-presets git+file://$GITHUB_WORKSPACE/nix-presets \
            --override-input nix-hardware git+file://$GITHUB_WORKSPACE/nix-hardware \
            --override-input nix-packages git+file://$GITHUB_WORKSPACE/nix-packages \
            --override-input nix-templates git+file://$GITHUB_WORKSPACE/nix-templates" >> "$GITHUB_ENV"

      - name: Generate Dynamic Matrix
        id: set-matrix
        run: |
          # Evaluate flake.nix and cross-reference with inventory.nix to find all deployed hosts and their architectures
          MATRIX_JSON=$(nix eval .#nixosConfigurations --impure --apply 'configs:
            let
              inv = import ./nix-config/inventory.nix;
              getRunner = sys: if sys == "aarch64-linux" then "ubuntu-24.04-arm" else [ "self-hosted" "nixos" ];
              # Filter out helper hosts that we do not want to build as full standalone OS closures
              hosts = builtins.filter (h: h != "container-factory" && h != "orin-nano-bootstrap") (builtins.attrNames configs);
            in
              builtins.filter (x: x != null) (builtins.map (name:
                let meta = inv.hosts.${name} or {}; in
                # TEMPORARY (revisit after the wired OpenWrt router lands): only build
                # x86_64 hosts in CI. The aarch64 fleet (orin-nano, core-pi, hass-pi) is
                # excluded because it cannot cache via hosted ARM runners — pushes hit
                # Cloudflares 413 body cap, and orin-nano fails a jetpack/nixpkgs eval
                # skew. They are built & deployed on-target via colmena in the meantime.
                if (meta.system or "") == "x86_64-linux" then {
                  host = name;
                  runner = getRunner meta.system;
                } else null
              ) hosts)
          ' --json $NIX_OVERRIDES)
          
          echo "Discovered Matrix: $MATRIX_JSON"
          echo "matrix=$MATRIX_JSON" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------
  # STAGE 2: The "Fleet" - Dynamically Build All Discovered Hosts
  # ---------------------------------------------------------
  build-system:
    name: "Build ${{ matrix.host }}"
    needs: generate-matrix
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}
    steps:
      - name: Maximize Build Space
        if: matrix.runner == 'ubuntu-latest'
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 512
          swap-size-mb: 1024
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-docker-images: 'true'
          remove-codeql: 'true'

      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Init submodules (skip nix-secrets)
        run: |
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git -c submodule."nix-secrets".update=none submodule update --init --recursive

      - name: Set up dummy secrets
        run: ./scripts/write-dummy-secrets.sh

      - name: Set Nix input overrides
        run: |
          echo "NIX_OVERRIDES=\
            --override-input nix-secrets /tmp/dummy-secrets \
            --override-input nix-config git+file://$GITHUB_WORKSPACE/nix-config \
            --override-input nix-devshells git+file://$GITHUB_WORKSPACE/nix-devshells \
            --override-input nix-presets git+file://$GITHUB_WORKSPACE/nix-presets \
            --override-input nix-hardware git+file://$GITHUB_WORKSPACE/nix-hardware \
            --override-input nix-packages git+file://$GITHUB_WORKSPACE/nix-packages \
            --override-input nix-templates git+file://$GITHUB_WORKSPACE/nix-templates" >> "$GITHUB_ENV"

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22
        with:
          extra-conf: |
            sandbox = false
            trusted-users = root runner

      - name: Setup Attic Cache
        uses: ryanccn/attic-action@v0
        with:
          endpoint: https://cache.kleinbem.dev/
          cache: system
          token: ${{ secrets.ATTIC_PUSH_TOKEN }}

      - name: Build System Top-Level
        run: |
          nix build .#nixosConfigurations.${{ matrix.host }}.config.system.build.toplevel \
            --impure -L $NIX_OVERRIDES

      - name: Push to Attic
        run: |
          attic push system $(nix-store -qR result)
