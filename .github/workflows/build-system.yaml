name: "Build & Cache NixOS System"

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  # ---------------------------------------------------------
  # STAGE 1: The "Scout" - Discover all NixOS Configurations
  # ---------------------------------------------------------
  generate-matrix:
    name: "Discover Fleet Matrix"
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Init submodules (skip nix-secrets)
        run: |
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git -c submodule."nix-secrets".update=none submodule update --init --recursive

      - name: Set up dummy secrets
        run: ./scripts/write-dummy-secrets.sh

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22

      - name: Set Nix input overrides
        run: |
          echo "NIX_OVERRIDES=\
            --override-input nix-secrets /tmp/dummy-secrets \
            --override-input nix-config git+file://$GITHUB_WORKSPACE/nix-config \
            --override-input nix-devshells git+file://$GITHUB_WORKSPACE/nix-devshells \
            --override-input nix-presets git+file://$GITHUB_WORKSPACE/nix-presets \
            --override-input nix-hardware git+file://$GITHUB_WORKSPACE/nix-hardware \
            --override-input nix-packages git+file://$GITHUB_WORKSPACE/nix-packages \
            --override-input nix-templates git+file://$GITHUB_WORKSPACE/nix-templates" >> "$GITHUB_ENV"

      - name: Generate Dynamic Matrix
        id: set-matrix
        run: |
          # Evaluate flake.nix and cross-reference with inventory.nix to find all deployed hosts and their architectures
          MATRIX_JSON=$(nix eval .#nixosConfigurations --impure --apply 'configs:
            let
              inv = import ./nix-config/inventory.nix;
              getRunner = sys: if sys == "aarch64-linux" then "ubuntu-24.04-arm" else "ubuntu-latest";
              # Filter out helper hosts that we do not want to build as full standalone OS closures
              hosts = builtins.filter (h: h != "container-factory" && h != "orin-nano-bootstrap" && h != "orin-nano" && h != "core-pi") (builtins.attrNames configs);
            in
              builtins.filter (x: x != null) (builtins.map (name:
                let meta = inv.hosts.${name} or {}; in
                {
                  host = name;
                  runner = getRunner (meta.system or "");
                }
              ) hosts)
          ' --json $NIX_OVERRIDES)
          
          echo "Discovered Matrix: $MATRIX_JSON"
          echo "matrix=$MATRIX_JSON" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------
  # STAGE 2: The "Fleet" - Dynamically Build All Discovered Hosts
  # ---------------------------------------------------------
  build-system:
    name: "Build ${{ matrix.host }}"
    needs: generate-matrix
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      # Serialize host builds so they don't push to Attic concurrently — parallel
      # pushes raced on shared chunks (e.g. etc-machine-id) → "Bad chunk hash or size".
      max-parallel: 1
      matrix:
        include: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}
    steps:
      - name: Maximize Build Space
        if: matrix.runner == 'ubuntu-latest'
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 512
          swap-size-mb: 1024
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-docker-images: 'true'
          remove-codeql: 'true'

      - name: Free Disk Space (ARM fallback)
        if: matrix.runner != 'ubuntu-latest'
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost "$AGENT_TOOLSDIRECTORY" || true
          docker system prune -af || true
          sudo apt-get clean || true

      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Init submodules (skip nix-secrets)
        run: |
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git -c submodule."nix-secrets".update=none submodule update --init --recursive

      - name: Set up dummy secrets
        run: ./scripts/write-dummy-secrets.sh

      - name: Set Nix input overrides
        run: |
          echo "NIX_OVERRIDES=\
            --override-input nix-secrets /tmp/dummy-secrets \
            --override-input nix-config git+file://$GITHUB_WORKSPACE/nix-config \
            --override-input nix-devshells git+file://$GITHUB_WORKSPACE/nix-devshells \
            --override-input nix-presets git+file://$GITHUB_WORKSPACE/nix-presets \
            --override-input nix-hardware git+file://$GITHUB_WORKSPACE/nix-hardware \
            --override-input nix-packages git+file://$GITHUB_WORKSPACE/nix-packages \
            --override-input nix-templates git+file://$GITHUB_WORKSPACE/nix-templates" >> "$GITHUB_ENV"

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22
        with:
          extra-conf: |
            sandbox = false
            trusted-users = root runner
            min-free = 1073741824
            max-free = 2147483648

      - name: Setup NetBird VPN
        run: |
          if ! command -v netbird &> /dev/null; then
            curl -fsSL https://pkgs.netbird.io/install.sh | sh
          fi
          sudo systemctl start netbird || true
          sudo netbird up --setup-key ${{ secrets.NETBIRD_SETUP_KEY }}

      - name: Route Attic over NetBird
        run: echo "100.117.212.232 cache.kleinbem.dev" | sudo tee -a /etc/hosts

      - name: Trust internal Caddy CA
        run: |
          sudo cp nix-config/pki/caddy-root.crt /usr/local/share/ca-certificates/caddy-root.crt
          sudo update-ca-certificates
          echo "SSL_CERT_FILE=/etc/ssl/certs/ca-certificates.crt" >> $GITHUB_ENV
          echo "NIX_SSL_CERT_FILE=/etc/ssl/certs/ca-certificates.crt" >> $GITHUB_ENV

      - name: Setup Attic Cache
        uses: ryanccn/attic-action@v0
        with:
          endpoint: https://cache.kleinbem.dev/
          cache: system
          token: ${{ secrets.ATTIC_PUSH_TOKEN }}

      - name: Build System Top-Level
        run: |
          nix build .#nixosConfigurations.${{ matrix.host }}.config.system.build.toplevel \
            --impure -L $NIX_OVERRIDES

      - name: Push to Attic
        run: |
          # Tolerate ONLY the known atticd bad-chunk bug (a stale/corrupt stored chunk
          # for nixos-nvme's 33-byte etc-machine-id NAR — atticd 2025-09-24, which is
          # already upstream HEAD, so there's no version that fixes it). Every OTHER
          # push failure (cache down, expired token, …) still fails the job, so we keep
          # real failure reporting instead of the blanket continue-on-error mask.
          # Real fix would be clearing that chunk on atticd (cache.kleinbem.dev).
          if ! attic push system $(nix-store -qR result) >push.log 2>&1; then
            cat push.log
            if grep -q "Bad chunk hash or size" push.log; then
              echo "::warning::Attic push hit the known etc-machine-id bad-chunk bug; rest of the closure cached. Clear that chunk on atticd to remove this guard."
            else
              echo "::error::Attic push failed for a reason other than the known chunk bug."
              exit 1
            fi
          fi
