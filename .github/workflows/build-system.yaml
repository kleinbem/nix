name: "Build & Cache NixOS System"

on:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'terraform/**'
      - 'LICENSE'
  workflow_dispatch:
  schedule:
    # Weekly heavy-host warm-up: builds the closures that are too big for
    # per-push (nixos-nvme) so the Attic cache stays warm for `just apply`.
    # Mondays 04:00 UTC.
    - cron: '0 4 * * 1'

# Cancel any in-flight run on the same ref when a newer push arrives —
# stops back-to-back fixes from piling up CI minutes on stale code.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------
  # STAGE 1: The "Scout" - Discover all NixOS Configurations
  # ---------------------------------------------------------
  generate-matrix:
    name: "Discover Fleet Matrix"
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Clone sub-flakes (from repos.nix)
        run: ./scripts/clone-subflakes.sh

      - name: Set up dummy secrets
        run: ./scripts/write-dummy-secrets.sh

      - name: Install Nix (Determinate)
        uses: DeterminateSystems/determinate-nix-action@v3

      - name: Set Nix input overrides
        run: |
          echo "NIX_OVERRIDES=\
            --override-input nix-secrets /tmp/dummy-secrets \
            --override-input nix-config git+file://$GITHUB_WORKSPACE/nix-config \
            --override-input nix-devshells git+file://$GITHUB_WORKSPACE/nix-devshells \
            --override-input nix-presets git+file://$GITHUB_WORKSPACE/nix-presets \
            --override-input nix-hardware git+file://$GITHUB_WORKSPACE/nix-hardware \
            --override-input nix-packages git+file://$GITHUB_WORKSPACE/nix-packages \
            --override-input nix-templates git+file://$GITHUB_WORKSPACE/nix-templates" >> "$GITHUB_ENV"

      - name: Generate Dynamic Matrix
        id: set-matrix
        run: |
          # Evaluate flake.nix and cross-reference with inventory.nix to find all deployed hosts and their architectures.
          # Filters:
          # - orin-nano: jetpack-nixos has eval skew on CI runners (separate ticket).
          # - container-factory / orin-nano-bootstrap: non-host build targets, not deployable closures.
          MATRIX_JSON=$(nix eval .#nixosConfigurations --impure --apply 'configs:
            let
              inv = import ./nix-config/inventory.nix;
              getRunner = sys: if sys == "aarch64-linux" then "ubuntu-24.04-arm" else "ubuntu-latest";
              hosts = builtins.filter (h: h != "container-factory" && h != "orin-nano-bootstrap" && h != "orin-nano") (builtins.attrNames configs);
            in
              builtins.filter (x: x != null) (builtins.map (name:
                let meta = inv.hosts.${name} or {}; in
                {
                  host = name;
                  runner = getRunner (meta.system or "");
                }
              ) hosts)
          ' --json $NIX_OVERRIDES)

          # Tier filter: nixos-nvme's closure is too big to fit a per-push budget
          # (huge desktop+AI+gaming closure). On `push` events build the lighter
          # fleet; on `workflow_dispatch` / `schedule` build everything so the
          # weekly fleet-health run warms the cache for `just apply`.
          if [ "${{ github.event_name }}" = "push" ]; then
            MATRIX_JSON=$(echo "$MATRIX_JSON" | jq '[.[] | select(.host != "nixos-nvme")]')
          fi

          echo "Discovered Matrix: $MATRIX_JSON"
          echo "matrix=$MATRIX_JSON" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------
  # STAGE 2: The "Fleet" - Dynamically Build All Discovered Hosts
  # ---------------------------------------------------------
  build-system:
    name: "Build ${{ matrix.host }}"
    needs: generate-matrix
    if: ${{ needs.generate-matrix.outputs.matrix != '[]' }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      # Serialize host builds so they don't push to Attic concurrently — parallel
      # pushes raced on shared chunks (e.g. etc-machine-id) → "Bad chunk hash or size".
      max-parallel: 1
      matrix:
        include: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}
    steps:
      # Reclaim disk for the Nix store by deleting preinstalled toolchains.
      # endersonmenezes/free-disk-space@v3 is the actively-maintained successor
      # to the LVM-juggling easimon/maximize-build-space — same headroom, no
      # mount surgery (which silently lost log output on big closures).
      # Reference: carpenike/nix-config and colemickens/nixcfg.
      - name: Free disk space
        uses: endersonmenezes/free-disk-space@v3
        with:
          remove_android: 'true'
          remove_dotnet: 'true'
          remove_haskell: 'true'
          remove_tool_cache: 'true'
          remove_swap: 'true'
          remove_packages: "azure-cli google-cloud-cli microsoft-edge-stable google-chrome-stable firefox postgresql* temurin-* *llvm* mysql* dotnet-sdk-*"
          remove_packages_one_command: 'true'
          remove_folders: "/usr/share/swift /usr/share/miniconda /usr/share/az* /usr/local/lib/node_modules /usr/local/share/chromium /usr/local/share/powershell /usr/local/julia /usr/local/aws-cli /usr/local/aws-sam-cli /usr/share/gradle /usr/lib/jvm /home/runner/.rust /usr/local/.ghcup"
          rm_cmd: "rmz"
          rmz_version: "3.1.1"

      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Clone sub-flakes (from repos.nix)
        run: ./scripts/clone-subflakes.sh

      - name: Set up dummy secrets
        run: ./scripts/write-dummy-secrets.sh

      - name: Set Nix input overrides
        run: |
          echo "NIX_OVERRIDES=\
            --override-input nix-secrets /tmp/dummy-secrets \
            --override-input nix-config git+file://$GITHUB_WORKSPACE/nix-config \
            --override-input nix-devshells git+file://$GITHUB_WORKSPACE/nix-devshells \
            --override-input nix-presets git+file://$GITHUB_WORKSPACE/nix-presets \
            --override-input nix-hardware git+file://$GITHUB_WORKSPACE/nix-hardware \
            --override-input nix-packages git+file://$GITHUB_WORKSPACE/nix-packages \
            --override-input nix-templates git+file://$GITHUB_WORKSPACE/nix-templates" >> "$GITHUB_ENV"

      - name: Install Nix (Determinate)
        uses: DeterminateSystems/determinate-nix-action@v3
        with:
          extra-conf: |
            sandbox = false
            trusted-users = root runner

      - name: Configure Nix Auto-GC
        run: |
          echo "min-free = 1073741824" | sudo tee -a /etc/nix/nix.conf
          echo "max-free = 2147483648" | sudo tee -a /etc/nix/nix.conf
          sudo systemctl restart nix-daemon

      - name: Setup NetBird VPN
        run: |
          if ! command -v netbird &> /dev/null; then
            curl -fsSL https://pkgs.netbird.io/install.sh | sh
          fi
          sudo systemctl start netbird || true
          sudo netbird up --setup-key ${{ secrets.NETBIRD_SETUP_KEY }}

      - name: Route Attic over NetBird
        run: echo "100.117.212.232 cache.kleinbem.dev" | sudo tee -a /etc/hosts

      - name: Trust internal Caddy CA
        run: |
          sudo cp nix-config/pki/caddy-root.crt /usr/local/share/ca-certificates/caddy-root.crt
          sudo update-ca-certificates
          echo "SSL_CERT_FILE=/etc/ssl/certs/ca-certificates.crt" >> $GITHUB_ENV
          echo "NIX_SSL_CERT_FILE=/etc/ssl/certs/ca-certificates.crt" >> $GITHUB_ENV

      - name: Setup Attic Cache
        uses: ryanccn/attic-action@v0
        with:
          endpoint: https://cache.kleinbem.dev/
          cache: system
          token: ${{ secrets.ATTIC_PUSH_TOKEN }}

      - name: Build System Top-Level
        run: |
          set -o pipefail
          nix build .#nixosConfigurations.${{ matrix.host }}.config.system.build.toplevel \
            --impure -L $NIX_OVERRIDES \
            > >(tee /tmp/nix-build.log) 2> >(tee /tmp/nix-build.err >&2)

      - name: Surface build failure
        if: failure()
        run: |
          # Extract the failing drv from stderr and print its full builder log.
          # Saves a round-trip versus tailing the run log manually.
          if [ -f /tmp/nix-build.err ]; then
            drv=$(grep -oE "/nix/store/[^ ]+\.drv" /tmp/nix-build.err | tail -1 || true)
            if [ -n "$drv" ]; then
              echo "::group::nix log $drv"
              nix log "$drv" || true
              echo "::endgroup::"
            fi
          fi

      - name: Push to Attic
        run: |
          # Tolerate ONLY the known atticd bad-chunk bug (a stale/corrupt stored chunk
          # for nixos-nvme's 33-byte etc-machine-id NAR — atticd 2025-09-24, which is
          # already upstream HEAD, so there's no version that fixes it). Every OTHER
          # push failure (cache down, expired token, …) still fails the job, so we keep
          # real failure reporting instead of the blanket continue-on-error mask.
          # Real fix would be clearing that chunk on atticd (cache.kleinbem.dev).
          if ! attic push system $(nix-store -qR result) >push.log 2>&1; then
            cat push.log
            if grep -q "Bad chunk hash or size" push.log; then
              echo "::warning::Attic push hit the known etc-machine-id bad-chunk bug; rest of the closure cached. Clear that chunk on atticd to remove this guard."
            else
              echo "::error::Attic push failed for a reason other than the known chunk bug."
              exit 1
            fi
          fi
