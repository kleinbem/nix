name: "Update Flake Lock & Warm Cache"

on:
  schedule:
    # Every Sunday at 05:00 UTC
    - cron: '0 5 * * 0'
  workflow_dispatch:

# cancel-in-progress: false — this workflow opens + auto-merges a PR; cancelling
# midway risks leaving a half-created PR (or one without auto-merge enabled).
# Group still set so duplicate dispatches don't race.
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  actions: write

jobs:
  update:
    name: "Update lock & open PR"
    runs-on: ubuntu-latest
    outputs:
      branch: ${{ steps.cpr.outputs.pull-request-branch }}
      created: ${{ steps.cpr.outputs.pull-request-operation }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          # create-pull-request configures its own auth header; if checkout also
          # persists one, git sends a duplicate Authorization header → GitHub 400.
          persist-credentials: false

      - name: Clone sub-flakes (from repos.nix)
        run: ./scripts/clone-subflakes.sh

      - name: Install Nix (Determinate)
        uses: DeterminateSystems/determinate-nix-action@v3
        with:
          extra-conf: |
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}

      - name: Update external flake inputs
        run: |
          # Bump every real upstream dependency. Updating named inputs leaves the
          # rest locked (and thus never fetched), which also lets this run in CI.
          #
          # The local nix-* sub-repos (nix-config, nix-devshells, nix-presets,
          # nix-hardware, nix-packages, nix-templates, nix-secrets) are intentionally
          # NOT passed: every build — local (common.just OVERRIDES) and CI
          # (NIX_OVERRIDES) — supplies `--override-input <repo> git+file://<checkout>`,
          # so their flake.lock pins are never consulted. Bumping them here would be a
          # no-op that only adds PR noise; they move when you commit to the sub-flake repos.
          #
          # Also held back, deliberately: devenv (pinned — see FIXME in flake.nix) and
          # jetpack-nixos (cache-sensitive aarch64 input; bump when its cache is ready).
          nix flake update \
            nixpkgs nixpkgs-stable nixpkgs-master \
            flake-parts ghostty nixos-generators \
            home-manager sops-nix nix2container mk-shell-bin nix-on-droid

      - name: Create Pull Request
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          # Built-in GITHUB_TOKEN (no PAT to manage). It can't cascade-trigger the
          # cache-warming workflows from the PR event, so warm-system dispatches them
          # explicitly below.
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(flake): update external inputs"
          title: "chore(flake): update external inputs"
          body: |
            Automated update of root `flake.lock` for external inputs
            (nixpkgs, home-manager, sops-nix, …). Local sub-flake inputs
            are managed per-repo by each sub-flake's `maintain.yml`.

            Cache-warming CI runs automatically on this PR
            (devshells, packages, containers) and `build-system`
            is dispatched against this branch. Once everything is
            green, `just apply` should pull binaries instead of
            rebuilding locally.
          branch: "automation/flake-update"
          delete-branch: true

      - name: Enable Pull Request Automerge
        if: steps.cpr.outputs.pull-request-operation == 'created'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge --auto --squash "${{ steps.cpr.outputs.pull-request-number }}"

  warm-system:
    name: "Warm system closures"
    needs: update
    if: needs.update.outputs.created != 'none'
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch cache-warming builds against the update branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # GITHUB_TOKEN-created PRs don't cascade-trigger workflows, so warm each
          # cache explicitly against the update branch. These run on the self-hosted
          # runner (nixos-nvme) and push to Attic, so `just apply` pulls instead of
          # rebuilding locally. Containers are omitted (rarely change on a root-lock
          # bump, and 29 closures are heavy) — dispatch build-containers.yaml manually
          # if a bump touches them.
          BR="${{ needs.update.outputs.branch }}"
          for wf in build-system.yaml build-packages.yaml build-devshells.yaml check.yaml; do
            echo "Dispatching $wf against $BR"
            gh workflow run "$wf" --repo "$GITHUB_REPOSITORY" --ref "$BR"
          done
