name: "Nix CI & Cache"

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  lint-and-format:
    name: "Lint & Format Audit"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Init submodules (skip nix-secrets)
        run: git -c submodule."nix-secrets".update=none submodule update --init --recursive

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Run treefmt check
        run: |
          nix shell nixpkgs#treefmt -c treefmt --fail-on-change

  flake-checks:
    name: "Nix Flake Evaluation & Checks"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Init submodules (skip nix-secrets)
        run: git -c submodule."nix-secrets".update=none submodule update --init --recursive

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Set up Cachix
        uses: cachix/cachix-action@v14
        with:
          name: kleinbem
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
          # If triggered by a PR from a fork, authToken won't be available,
          # so we only require it for pushes to main or internal PRs.
          skipPush: ${{ github.actor == 'dependabot[bot]' || github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository }}

      - name: Set up dummy secrets
        run: |
          mkdir -p /tmp/dummy-secrets
          echo "{}" > /tmp/dummy-secrets/secrets.yaml

      - name: Run root flake checks
        run: |
          nix flake check --impure --no-build --override-input nix-secrets /tmp/dummy-secrets

      - name: Run sub-flake evaluation checks
        run: |
          for repo in nix-*; do
            if [ -f "$repo/flake.nix" ]; then
              echo "Checking evaluation of $repo..."
              nix flake check "./$repo" --impure --no-build --override-input nix-secrets /tmp/dummy-secrets
            fi
          done
  integration-tests:
    name: "System Integration & VM Tests"
    # Only run heavy integration/VM builds on self-hosted runners when requested manually or on push to main
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: [self-hosted, nixos]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Init submodules (skip nix-secrets)
        run: git -c submodule."nix-secrets".update=none submodule update --init --recursive

      - name: Set up Cachix
        uses: cachix/cachix-action@v14
        with:
          name: kleinbem
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Run integration VM build tests
        run: |
          # Build workstation VM target to verify system derivation integrity
          nix build .#nixosConfigurations.nixos-nvme.config.system.build.vm --impure -L
