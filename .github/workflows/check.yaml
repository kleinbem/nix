name: "Nix CI & Cache"

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  lint-and-format:
    name: "Lint & Format Audit"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Init submodules (skip nix-secrets)
        run: |
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git -c submodule."nix-secrets".update=none submodule update --init --recursive

      - name: Set up dummy secrets
        run: |
          mkdir -p /tmp/dummy-secrets
          echo "{}" > /tmp/dummy-secrets/secrets.yaml

      - name: Set Nix input overrides
        run: |
          echo "NIX_OVERRIDES=\
            --override-input nix-secrets /tmp/dummy-secrets \
            --override-input nix-config git+file://$GITHUB_WORKSPACE/nix-config \
            --override-input nix-devshells git+file://$GITHUB_WORKSPACE/nix-devshells \
            --override-input nix-presets git+file://$GITHUB_WORKSPACE/nix-presets \
            --override-input nix-hardware git+file://$GITHUB_WORKSPACE/nix-hardware \
            --override-input nix-packages git+file://$GITHUB_WORKSPACE/nix-packages \
            --override-input nix-templates git+file://$GITHUB_WORKSPACE/nix-templates" >> "$GITHUB_ENV"

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22

      - name: Run format check
        run: nix fmt $NIX_OVERRIDES -- --fail-on-change

  flake-checks:
    name: "Nix Flake Evaluation & Checks"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Init submodules (skip nix-secrets)
        run: |
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git -c submodule."nix-secrets".update=none submodule update --init --recursive

      - name: Set up dummy secrets
        run: |
          mkdir -p /tmp/dummy-secrets
          echo "{}" > /tmp/dummy-secrets/secrets.yaml

      - name: Set Nix input overrides
        run: |
          echo "NIX_OVERRIDES=\
            --override-input nix-secrets /tmp/dummy-secrets \
            --override-input nix-config git+file://$GITHUB_WORKSPACE/nix-config \
            --override-input nix-devshells git+file://$GITHUB_WORKSPACE/nix-devshells \
            --override-input nix-presets git+file://$GITHUB_WORKSPACE/nix-presets \
            --override-input nix-hardware git+file://$GITHUB_WORKSPACE/nix-hardware \
            --override-input nix-packages git+file://$GITHUB_WORKSPACE/nix-packages \
            --override-input nix-templates git+file://$GITHUB_WORKSPACE/nix-templates" >> "$GITHUB_ENV"

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22

      - name: Set up Cachix
        uses: cachix/cachix-action@v17
        with:
          name: kleinbem
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
          skipPush: ${{ !secrets.CACHIX_AUTH_TOKEN || github.actor == 'dependabot[bot]' || github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository }}

      - name: Run root flake checks
        run: nix flake check --impure --no-build $NIX_OVERRIDES

      - name: Run sub-flake evaluation checks
        run: |
          for repo in nix-*; do
            if [ -f "$repo/flake.nix" ]; then
              echo "Checking evaluation of $repo..."
              nix flake check "./$repo" --impure --no-build \
                --override-input nix-secrets /tmp/dummy-secrets
            fi
          done

  integration-tests:
    name: "System Integration & VM Tests"
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: [self-hosted, nixos]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Init submodules (skip nix-secrets)
        run: |
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git -c submodule."nix-secrets".update=none submodule update --init --recursive

      - name: Set up dummy secrets
        run: |
          mkdir -p /tmp/dummy-secrets
          echo "{}" > /tmp/dummy-secrets/secrets.yaml

      - name: Set Nix input overrides
        run: |
          echo "NIX_OVERRIDES=\
            --override-input nix-secrets /tmp/dummy-secrets \
            --override-input nix-config git+file://$GITHUB_WORKSPACE/nix-config \
            --override-input nix-devshells git+file://$GITHUB_WORKSPACE/nix-devshells \
            --override-input nix-presets git+file://$GITHUB_WORKSPACE/nix-presets \
            --override-input nix-hardware git+file://$GITHUB_WORKSPACE/nix-hardware \
            --override-input nix-packages git+file://$GITHUB_WORKSPACE/nix-packages \
            --override-input nix-templates git+file://$GITHUB_WORKSPACE/nix-templates" >> "$GITHUB_ENV"

      - name: Run integration VM build tests
        run: nix build .#nixosConfigurations.nixos-nvme.config.system.build.vm --impure -L $NIX_OVERRIDES
