name: "Nix CI & Cache"

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
  pull_request:

jobs:
  lint-and-format:
    name: "Lint & Format Audit"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Clone sub-flakes (from repos.nix)
        run: ./scripts/clone-subflakes.sh

      - name: Set up dummy secrets
        run: ./scripts/write-dummy-secrets.sh

      - name: Set Nix input overrides
        run: |
          echo "NIX_OVERRIDES=\
            --override-input nix-secrets /tmp/dummy-secrets \
            --override-input nix-config git+file://$GITHUB_WORKSPACE/nix-config \
            --override-input nix-devshells git+file://$GITHUB_WORKSPACE/nix-devshells \
            --override-input nix-presets git+file://$GITHUB_WORKSPACE/nix-presets \
            --override-input nix-hardware git+file://$GITHUB_WORKSPACE/nix-hardware \
            --override-input nix-packages git+file://$GITHUB_WORKSPACE/nix-packages \
            --override-input nix-templates git+file://$GITHUB_WORKSPACE/nix-templates" >> "$GITHUB_ENV"

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22

      - name: Run format check
        run: nix fmt $NIX_OVERRIDES -- --fail-on-change

  flake-checks:
    name: "Nix Flake Evaluation & Checks"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Clone sub-flakes (from repos.nix)
        run: ./scripts/clone-subflakes.sh

      - name: Set up dummy secrets
        run: ./scripts/write-dummy-secrets.sh

      - name: Set Nix input overrides
        run: |
          echo "NIX_OVERRIDES=\
            --override-input nix-secrets /tmp/dummy-secrets \
            --override-input nix-config git+file://$GITHUB_WORKSPACE/nix-config \
            --override-input nix-devshells git+file://$GITHUB_WORKSPACE/nix-devshells \
            --override-input nix-presets git+file://$GITHUB_WORKSPACE/nix-presets \
            --override-input nix-hardware git+file://$GITHUB_WORKSPACE/nix-hardware \
            --override-input nix-packages git+file://$GITHUB_WORKSPACE/nix-packages \
            --override-input nix-templates git+file://$GITHUB_WORKSPACE/nix-templates" >> "$GITHUB_ENV"

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22

      - name: Setup NetBird VPN
        run: |
          if ! command -v netbird &> /dev/null; then
            curl -fsSL https://pkgs.netbird.io/install.sh | sh
          fi
          sudo systemctl start netbird || true
          sudo netbird up --setup-key ${{ secrets.NETBIRD_SETUP_KEY }}

      - name: Route Attic over NetBird
        run: echo "100.117.212.232 cache.kleinbem.dev" | sudo tee -a /etc/hosts

      - name: Trust internal Caddy CA
        run: |
          sudo cp nix-config/pki/caddy-root.crt /usr/local/share/ca-certificates/caddy-root.crt
          sudo update-ca-certificates
          echo "SSL_CERT_FILE=/etc/ssl/certs/ca-certificates.crt" >> $GITHUB_ENV
          echo "NIX_SSL_CERT_FILE=/etc/ssl/certs/ca-certificates.crt" >> $GITHUB_ENV

      - name: Setup Attic Cache
        uses: ryanccn/attic-action@v0
        with:
          endpoint: https://cache.kleinbem.dev/
          cache: system
          token: ${{ secrets.ATTIC_PUSH_TOKEN }}

      - name: Run root flake checks (x86_64-scoped — TEMPORARY)
        run: |
          # TEMPORARY (revisit after the wired OpenWrt router lands): a plain
          # `nix flake check` evaluates ALL nixosConfigurations, but the aarch64
          # orin-nano hits a jetpack/nixpkgs eval skew in CI. Scope to the x86_64
          # `checks` output (already filtered to x86_64 hosts) so CI validates what it
          # can actually build, instead of choking on the excluded aarch64 fleet.
          # Force-evaluate each check's drvPath: validates they all evaluate (catching
          # eval errors) WITHOUT the slow substituter queries that `nix build --dry-run`
          # does over Cloudflare for every path in the closure.
          nix eval --impure $NIX_OVERRIDES .#checks.x86_64-linux \
            --apply 'cs: builtins.length (builtins.attrValues (builtins.mapAttrs (_: c: c.drvPath) cs))'

      # NOTE: the per-sub-flake `nix flake check ./<repo>` loop was removed. It was
      # (a) redundant — the root x86_64 checks above already aggregate the sub-flakes'
      # checks, and each sub-flake has its own ci.yaml — and (b) broken in CI: some
      # sub-flake locks pin nix-devshells to an absolute local path (/home/martin/...)
      # that doesn't exist on the runner, so the loop only-overriding nix-secrets failed
      # with "Git repository … does not exist".

  integration-tests:
    name: "System Integration & VM Tests"
    if: >
      github.event_name == 'workflow_dispatch' || 
      github.event_name == 'schedule' || 
      (github.event_name == 'push' && github.ref == 'refs/heads/main' && contains(github.event.head_commit.message, '[run-tests]'))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Clone sub-flakes (from repos.nix)
        run: ./scripts/clone-subflakes.sh

      - name: Set up dummy secrets
        run: ./scripts/write-dummy-secrets.sh

      - name: Set Nix input overrides
        run: |
          echo "NIX_OVERRIDES=\
            --override-input nix-secrets /tmp/dummy-secrets \
            --override-input nix-config git+file://$GITHUB_WORKSPACE/nix-config \
            --override-input nix-devshells git+file://$GITHUB_WORKSPACE/nix-devshells \
            --override-input nix-presets git+file://$GITHUB_WORKSPACE/nix-presets \
            --override-input nix-hardware git+file://$GITHUB_WORKSPACE/nix-hardware \
            --override-input nix-packages git+file://$GITHUB_WORKSPACE/nix-packages \
            --override-input nix-templates git+file://$GITHUB_WORKSPACE/nix-templates" >> "$GITHUB_ENV"

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22

      - name: Setup NetBird VPN
        run: |
          if ! command -v netbird &> /dev/null; then
            curl -fsSL https://pkgs.netbird.io/install.sh | sh
          fi
          sudo systemctl start netbird || true
          sudo netbird up --setup-key ${{ secrets.NETBIRD_SETUP_KEY }}

      - name: Route Attic over NetBird
        run: echo "100.117.212.232 cache.kleinbem.dev" | sudo tee -a /etc/hosts

      - name: Trust internal Caddy CA
        run: |
          sudo cp nix-config/pki/caddy-root.crt /usr/local/share/ca-certificates/caddy-root.crt
          sudo update-ca-certificates
          echo "SSL_CERT_FILE=/etc/ssl/certs/ca-certificates.crt" >> $GITHUB_ENV
          echo "NIX_SSL_CERT_FILE=/etc/ssl/certs/ca-certificates.crt" >> $GITHUB_ENV

      - name: Setup Attic Cache
        uses: ryanccn/attic-action@v0
        with:
          endpoint: https://cache.kleinbem.dev/
          cache: system
          token: ${{ secrets.ATTIC_PUSH_TOKEN }}

      - name: Build & run x86_64 checks (executes the nixosTest VMs)
        run: |
          # The fast flake-checks job above only EVALUATES checks (drvPath) for quick
          # PR feedback — it doesn't execute them. Here (self-hosted, push-to-main,
          # deps cached) we actually BUILD the checks, which RUNS the nixosTest VMs
          # (caddy-test, code-server-test, mobile-link-test, recovery-test) plus the
          # module/host checks. Scoped to x86_64 to skip the aarch64 jetpack eval skew.
          nix flake check . --system x86_64-linux --impure -L --max-jobs 1 --cores 2 $NIX_OVERRIDES
