name: "Build & Cache Decoupled Containers"

on:
  push:
    branches:
      - main
      - master
    paths:
      - ".github/workflows/build-containers.yaml"
      - ".github/actions/nix-fleet-setup/**"
      - "nix-presets/containers/**"
      - "nix-config/hosts/**"
      - "nix-config/flake.nix"
      - "nix-config/flake.lock"
      - "scripts/container-deploy.sh"
  pull_request:
    paths:
      - ".github/workflows/build-containers.yaml"
      - ".github/actions/nix-fleet-setup/**"
      - "nix-presets/containers/**"
      - "nix-config/hosts/**"
      - "nix-config/flake.nix"
      - "nix-config/flake.lock"
      - "scripts/container-deploy.sh"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------
  # STAGE 1: Discover every container declared by container-factory
  # ---------------------------------------------------------
  generate-matrix:
    name: "Discover Container Matrix"
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Nix fleet setup (no cache push)
        uses: ./.github/actions/nix-fleet-setup
        with:
          enable-cache: 'false'

      - name: Generate Dynamic Matrix
        id: set-matrix
        run: |
          MATRIX_JSON=$(nix eval .#nixosConfigurations.container-factory.config.containers \
            --impure --apply 'builtins.attrNames' --json $NIX_OVERRIDES)
          echo "Discovered Containers: $MATRIX_JSON"
          echo "matrix=$MATRIX_JSON" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------
  # STAGE 2: Build & cache each container's system path
  # ---------------------------------------------------------
  build-container:
    name: "Build container ${{ matrix.container }}"
    needs: generate-matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      # Serialize so containers don't push to Attic concurrently (shared chunks race
      # → "Bad chunk hash or size"). 29 parallel pushes would be the worst offender.
      max-parallel: 1
      matrix:
        container: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Nix fleet setup
        uses: ./.github/actions/nix-fleet-setup
        with:
          netbird-setup-key: ${{ secrets.NETBIRD_SETUP_KEY }}
          attic-token: ${{ secrets.ATTIC_PUSH_TOKEN }}
          netbird: 'false'

      - name: Build container path
        run: |
          nix build ".#nixosConfigurations.container-factory.config.containers.${{ matrix.container }}.path" \
            --impure -L $NIX_OVERRIDES

      - name: Push to Attic
        run: |
          attic push system $(nix-store -qR result)
