name: "Build & Cache Devshells"

on:
  push:
    branches:
      - main
      - master
    paths:
      - ".github/workflows/build-devshells.yaml"
      - ".github/actions/nix-fleet-setup/**"
      - "flake.nix"
      - "flake.lock"
      - "devenv.nix"
      - "nix-devshells/**"
  pull_request:
    paths:
      - ".github/workflows/build-devshells.yaml"
      - ".github/actions/nix-fleet-setup/**"
      - "flake.nix"
      - "flake.lock"
      - "devenv.nix"
      - "nix-devshells/**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------
  # STAGE 1: Discover all exposed devShells
  # ---------------------------------------------------------
  generate-matrix:
    name: "Discover Devshell Matrix"
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Nix fleet setup (no cache push)
        uses: ./.github/actions/nix-fleet-setup
        with:
          enable-cache: 'false'

      - name: Generate Dynamic Matrix
        id: set-matrix
        run: |
          MATRIX_JSON=$(nix eval .#devShells.x86_64-linux --impure --apply 'builtins.attrNames' --json $NIX_OVERRIDES)
          echo "Discovered Devshells: $MATRIX_JSON"
          echo "matrix=$MATRIX_JSON" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------
  # STAGE 2: Build & cache each devshell closure
  # ---------------------------------------------------------
  build-devshell:
    name: "Build devShell ${{ matrix.shell }}"
    needs: generate-matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      # Serialize so devshells don't push to Attic concurrently (shared chunks race
      # → "Bad chunk hash or size").
      max-parallel: 1
      matrix:
        shell: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Nix fleet setup
        uses: ./.github/actions/nix-fleet-setup
        with:
          netbird-setup-key: ${{ secrets.NETBIRD_SETUP_KEY }}
          attic-token: ${{ secrets.ATTIC_PUSH_TOKEN }}

      - name: Build devShell closure
        run: |
          nix build ".#devShells.x86_64-linux.${{ matrix.shell }}" \
            --impure --fallback -L $NIX_OVERRIDES

      - name: Push to Attic
        run: |
          attic push system $(nix-store -qR result)
