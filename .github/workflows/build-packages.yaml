name: "Build & Cache Packages"

on:
  push:
    branches:
      - main
      - master
    paths:
      - ".github/workflows/build-packages.yaml"
      - ".github/actions/nix-fleet-setup/**"
      - "flake.nix"
      - "flake.lock"
      - "nix-packages/**"
      - "nix-presets/**"
      - "scripts/**"
  pull_request:
    paths:
      - ".github/workflows/build-packages.yaml"
      - ".github/actions/nix-fleet-setup/**"
      - "flake.nix"
      - "flake.lock"
      - "nix-packages/**"
      - "nix-presets/**"
      - "scripts/**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-packages:
    name: "Build & Cache Packages"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Nix fleet setup
        uses: ./.github/actions/nix-fleet-setup
        with:
          netbird-setup-key: ${{ secrets.NETBIRD_SETUP_KEY }}
          attic-token: ${{ secrets.ATTIC_PUSH_TOKEN }}

      - name: Build & cache every package
        run: |
          set -uo pipefail
          # Exclude devenv-generated helper outputs (process-compose / container /
          # shell wrappers) that the devenv flake-module injects per shell — only
          # real packages from nix-packages / nix-presets are worth caching.
          # Emit newline-separated names directly via --raw so this needs no jq
          # (the self-hosted NixOS runner doesn't ship jq; hosted runners do).
          PKGS=$(nix eval .#packages.x86_64-linux --impure --raw --apply \
            'pkgs: builtins.concatStringsSep "\n" (builtins.filter (n: builtins.match ".*(devenv-(up|test)|container-(shell|processes))" n == null) (builtins.attrNames pkgs))' \
            $NIX_OVERRIDES)
          echo "Discovered packages:"; echo "$PKGS"
          FAILED=()
          for pkg in $PKGS; do
            echo "::group::Building $pkg"
            if nix build ".#packages.x86_64-linux.$pkg" --impure --keep-going --fallback -L $NIX_OVERRIDES --out-link "result-$pkg"; then
              attic push system $(nix-store -qR "result-$pkg")
            else
              echo "::warning::Failed to build package: $pkg"
              FAILED+=("$pkg")
            fi
            echo "::endgroup::"
          done
          if [ ${#FAILED[@]} -ne 0 ]; then
            echo "::warning::The following packages failed to build: ${FAILED[*]}"
          fi
