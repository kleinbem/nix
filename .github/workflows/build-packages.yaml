name: "Build & Cache Packages"

on:
  push:
    branches:
      - main
      - master
    paths:
      - ".github/workflows/build-packages.yaml"
      - "flake.nix"
      - "flake.lock"
      - "nix-packages/**"
      - "nix-presets/**"
      - "scripts/**"
  pull_request:
    paths:
      - ".github/workflows/build-packages.yaml"
      - "flake.nix"
      - "flake.lock"
      - "nix-packages/**"
      - "nix-presets/**"
      - "scripts/**"
  workflow_dispatch:

jobs:
  build-packages:
    name: "Build & Cache Packages"
    # Self-hosted (nixos-nvme): build + push to Attic over LAN (hosted → Cloudflare 413).
    runs-on: ubuntu-latest
    steps:
      # (Maximize Build Space removed — Ubuntu-only step, N/A on the self-hosted NixOS runner.)
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Clone sub-flakes (from repos.nix)
        run: ./scripts/clone-subflakes.sh

      - name: Set up dummy secrets
        run: ./scripts/write-dummy-secrets.sh

      - name: Set Nix input overrides
        run: |
          echo "NIX_OVERRIDES=\
            --override-input nix-secrets /tmp/dummy-secrets \
            --override-input nix-config git+file://$GITHUB_WORKSPACE/nix-config \
            --override-input nix-devshells git+file://$GITHUB_WORKSPACE/nix-devshells \
            --override-input nix-presets git+file://$GITHUB_WORKSPACE/nix-presets \
            --override-input nix-hardware git+file://$GITHUB_WORKSPACE/nix-hardware \
            --override-input nix-packages git+file://$GITHUB_WORKSPACE/nix-packages \
            --override-input nix-templates git+file://$GITHUB_WORKSPACE/nix-templates" >> "$GITHUB_ENV"

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22
        with:
          extra-conf: |
            sandbox = false
            trusted-users = root runner

      - name: Setup NetBird VPN
        run: |
          if ! command -v netbird &> /dev/null; then
            curl -fsSL https://pkgs.netbird.io/install.sh | sh
          fi
          sudo systemctl start netbird || true
          sudo netbird up --setup-key ${{ secrets.NETBIRD_SETUP_KEY }}

      - name: Route Attic over NetBird
        run: echo "100.117.212.232 cache.kleinbem.dev" | sudo tee -a /etc/hosts

      - name: Trust internal Caddy CA
        run: |
          sudo cp nix-config/pki/caddy-root.crt /usr/local/share/ca-certificates/caddy-root.crt
          sudo update-ca-certificates
          echo "SSL_CERT_FILE=/etc/ssl/certs/ca-certificates.crt" >> $GITHUB_ENV
          echo "NIX_SSL_CERT_FILE=/etc/ssl/certs/ca-certificates.crt" >> $GITHUB_ENV

      - name: Setup Attic Cache
        uses: ryanccn/attic-action@v0
        with:
          endpoint: https://cache.kleinbem.dev/
          cache: system
          token: ${{ secrets.ATTIC_PUSH_TOKEN }}

      - name: Build & cache every package
        run: |
          set -uo pipefail
          # Exclude devenv-generated helper outputs (process-compose / container /
          # shell wrappers) that the devenv flake-module injects per shell — only
          # real packages from nix-packages / nix-presets are worth caching.
          # Emit newline-separated names directly via --raw so this needs no jq
          # (the self-hosted NixOS runner doesn't ship jq; hosted runners do).
          PKGS=$(nix eval .#packages.x86_64-linux --impure --raw --apply \
            'pkgs: builtins.concatStringsSep "\n" (builtins.filter (n: builtins.match ".*(devenv-(up|test)|container-(shell|processes))" n == null) (builtins.attrNames pkgs))' \
            $NIX_OVERRIDES)
          echo "Discovered packages:"; echo "$PKGS"
          FAILED=()
          for pkg in $PKGS; do
            echo "::group::Building $pkg"
            if nix build ".#packages.x86_64-linux.$pkg" --impure -L $NIX_OVERRIDES --out-link "result-$pkg"; then
              attic push system $(nix-store -qR "result-$pkg")
            else
              echo "::warning::Failed to build package: $pkg"
              FAILED+=("$pkg")
            fi
            echo "::endgroup::"
          done
          if [ ${#FAILED[@]} -ne 0 ]; then
            echo "::warning::The following packages failed to build: ${FAILED[*]}"
          fi
