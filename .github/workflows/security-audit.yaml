name: "Security Audit (vulnix)"

# Weekly CVE scan of the nixos-nvme system closure with vulnix.
#
# Runs on the self-hosted runner (nixos-nvme): the closure is already in the
# local store (built by build-system / your own `just apply`), so realizing it
# is instant — no multi-GB pull or from-source rebuild like a hosted runner
# would do. Informational by design: it reports findings, it does not fail the
# build (nixpkgs always carries open CVEs). Tighten to fail-on-critical later.
on:
  schedule:
    # Wednesdays 06:00 UTC — midweek, off-peak, away from the Sunday update run.
    - cron: '0 6 * * 3'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  vulnix:
    name: "Scan nixos-nvme closure for CVEs"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Clone sub-flakes (from repos.nix)
        run: ./scripts/clone-subflakes.sh

      - name: Set up dummy secrets
        run: ./scripts/write-dummy-secrets.sh

      - name: Set Nix input overrides
        run: |
          echo "NIX_OVERRIDES=\
            --override-input nix-secrets /tmp/dummy-secrets \
            --override-input nix-config git+file://$GITHUB_WORKSPACE/nix-config \
            --override-input nix-devshells git+file://$GITHUB_WORKSPACE/nix-devshells \
            --override-input nix-presets git+file://$GITHUB_WORKSPACE/nix-presets \
            --override-input nix-hardware git+file://$GITHUB_WORKSPACE/nix-hardware \
            --override-input nix-packages git+file://$GITHUB_WORKSPACE/nix-packages \
            --override-input nix-templates git+file://$GITHUB_WORKSPACE/nix-templates" >> "$GITHUB_ENV"

      - name: Install Nix (Determinate)
        uses: DeterminateSystems/determinate-nix-action@v3
        with:
          extra-conf: |
            sandbox = false
            trusted-users = root runner

      - name: Setup NetBird VPN
        run: |
          if ! command -v netbird &> /dev/null; then
            curl -fsSL https://pkgs.netbird.io/install.sh | sh
          fi
          sudo systemctl start netbird || true
          sudo netbird up --setup-key ${{ secrets.NETBIRD_SETUP_KEY }}

      - name: Route Attic over NetBird
        run: echo "100.117.212.232 cache.kleinbem.dev" | sudo tee -a /etc/hosts

      - name: Trust internal Caddy CA
        run: |
          sudo cp nix-config/pki/caddy-root.crt /usr/local/share/ca-certificates/caddy-root.crt
          sudo update-ca-certificates
          echo "SSL_CERT_FILE=/etc/ssl/certs/ca-certificates.crt" >> $GITHUB_ENV
          echo "NIX_SSL_CERT_FILE=/etc/ssl/certs/ca-certificates.crt" >> $GITHUB_ENV

      - name: Setup Attic Cache
        uses: ryanccn/attic-action@v0
        with:
          endpoint: https://cache.kleinbem.dev/
          cache: system
          token: ${{ secrets.ATTIC_PUSH_TOKEN }}

      - name: Realize nixos-nvme closure (local store / cache)
        run: |
          nix build .#nixosConfigurations.nixos-nvme.config.system.build.toplevel \
            --impure -L $NIX_OVERRIDES --out-link result

      - name: Run vulnix
        run: |
          set -uo pipefail
          TOP=$(readlink -f result)
          # Text output → no jq needed (the self-hosted NixOS runner doesn't ship it).
          # vulnix exits non-zero when it finds CVEs; this scan is informational.
          nix run nixpkgs#vulnix -- --whitelist .github/vulnix-whitelist.toml "$TOP" > vulnix.txt 2>&1 || true
          {
            echo "## 🔒 vulnix CVE scan — nixos-nvme closure"
            echo ""
            echo '```'
            head -120 vulnix.txt
            echo '```'
            echo ""
            echo "_Full report in the \`vulnix-report\` artifact._"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload vulnix report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vulnix-report
          path: vulnix.txt
          if-no-files-found: ignore
