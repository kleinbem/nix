name: "Deploy Fleet"

on:
  workflow_run:
    workflows: ["Build & Cache All (Fast)"]
    branches: [main, master]
    types:
      - completed

jobs:
  deploy:
    name: "Deploy via Colmena"
    # Only run if the build was successful
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Nix fleet setup
        uses: ./.github/actions/nix-fleet-setup
        with:
          # Enable cache to pull from Attic directly
          enable-cache: 'true'
          netbird-setup-key: ${{ secrets.NETBIRD_SETUP_KEY }}
          attic-token: ${{ secrets.ATTIC_PUSH_TOKEN }}

      - name: Setup SSH for Deployment
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          # Disable strict host key checking to allow Colmena to connect to dynamic NetBird IPs
          echo "StrictHostKeyChecking no" > ~/.ssh/config

      - name: Deploy Fleet
        run: |
          # Deploy all nodes defined in flake.nix (that have deployment.targetHost configured)
          # We use --keep-going so offline nodes don't abort the entire deployment.
          nix run nixpkgs#colmena -- apply --keep-going --impure --show-trace $NIX_OVERRIDES
