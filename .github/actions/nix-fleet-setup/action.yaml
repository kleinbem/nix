name: 'Nix fleet setup'
description: 'Shared CI preamble for the meta-workspace: clones sub-flakes from repos.nix, installs Nix, and (optionally) brings up NetBird + Attic for builds that need to push to the binary cache.'

inputs:
  netbird-setup-key:
    description: 'NetBird setup key (only required when enable-cache=true).'
    required: false
    default: ''
  attic-token:
    description: 'Attic push token (only required when enable-cache=true).'
    required: false
    default: ''
  enable-cache:
    description: 'Bring up NetBird, trust the internal Caddy CA, and configure the Attic cache. Set to "false" for matrix-gen / eval-only jobs that do not push.'
    required: false
    default: 'true'
  configure-auto-gc:
    description: 'Configure Nix auto-gc (min-free / max-free) — recommended for big closure builds, skip for small jobs.'
    required: false
    default: 'false'

runs:
  using: 'composite'
  steps:
    - name: Clone sub-flakes (from repos.nix)
      shell: bash
      run: ./scripts/clone-subflakes.sh

    - name: Set up dummy secrets
      shell: bash
      run: ./scripts/write-dummy-secrets.sh

    - name: Set Nix input overrides
      shell: bash
      run: |
        echo "NIX_OVERRIDES=\
          --override-input nix-secrets /tmp/dummy-secrets \
          --override-input nix-config git+file://$GITHUB_WORKSPACE/nix-config \
          --override-input nix-devshells git+file://$GITHUB_WORKSPACE/nix-devshells \
          --override-input nix-presets git+file://$GITHUB_WORKSPACE/nix-presets \
          --override-input nix-hardware git+file://$GITHUB_WORKSPACE/nix-hardware \
          --override-input nix-packages git+file://$GITHUB_WORKSPACE/nix-packages \
          --override-input nix-templates git+file://$GITHUB_WORKSPACE/nix-templates" >> "$GITHUB_ENV"

    - name: Install Nix (Determinate)
      uses: DeterminateSystems/determinate-nix-action@v3
      with:
        extra-conf: |
          sandbox = false
          trusted-users = root runner

    # Magic Nix Cache uses GitHub's per-repo Action cache (~10 GB) as a
    # transparent Nix substituter. Layers on Attic: store paths already
    # present at cache.kleinbem.dev aren't duplicated into GHA cache
    # (via upstream-cache). Most-effective on cold runs where neither
    # Attic nor nixos.org has a needed path — falls back to GHA's cache
    # of prior CI builds before rebuilding from source.
    - name: Set up Magic Nix Cache
      uses: DeterminateSystems/magic-nix-cache-action@v14
      with:
        upstream-cache: 'https://cache.kleinbem.dev/system'

    - name: Configure Nix Auto-GC
      if: inputs.configure-auto-gc == 'true'
      shell: bash
      run: |
        echo "min-free = 1073741824" | sudo tee -a /etc/nix/nix.conf
        echo "max-free = 2147483648" | sudo tee -a /etc/nix/nix.conf
        sudo systemctl restart nix-daemon

    - name: Setup NetBird VPN
      if: inputs.enable-cache == 'true'
      shell: bash
      run: |
        set -euo pipefail
        if ! command -v netbird &> /dev/null; then
          curl -fsSL https://pkgs.netbird.io/install.sh | sh
        fi
        # No `|| true` here — if NetBird can't come up, the attic push will
        # eventually 413 on a >100 MiB NAR via Cloudflare anyway. Fail loud.
        sudo systemctl start netbird
        sudo netbird up --setup-key "${{ inputs.netbird-setup-key }}"

    - name: Route Attic over NetBird (fail-closed)
      if: inputs.enable-cache == 'true'
      shell: bash
      run: |
        set -euo pipefail
        echo "100.117.212.232 cache.kleinbem.dev" | sudo tee -a /etc/hosts
        # Verify the route to the Attic IP actually goes through NetBird's
        # `wt0` interface. Without this check, a silently-failed `netbird up`
        # would let DNS fall back to Cloudflare and the attic push would 413
        # on big NARs. Cheaper to fail here, before the build.
        route="$(ip route get 100.117.212.232)"
        echo "$route"
        if ! echo "$route" | grep -q 'dev wt0'; then
          echo "::error::NetBird route to cache.kleinbem.dev is not via wt0 — bailing before the build."
          sudo netbird status || true
          exit 1
        fi

    - name: Trust internal Caddy CA
      if: inputs.enable-cache == 'true'
      shell: bash
      run: |
        sudo cp nix-config/pki/caddy-root.crt /usr/local/share/ca-certificates/caddy-root.crt
        sudo update-ca-certificates
        echo "SSL_CERT_FILE=/etc/ssl/certs/ca-certificates.crt" >> "$GITHUB_ENV"
        echo "NIX_SSL_CERT_FILE=/etc/ssl/certs/ca-certificates.crt" >> "$GITHUB_ENV"

    - name: Setup Attic Cache
      if: inputs.enable-cache == 'true'
      uses: ryanccn/attic-action@v0
      with:
        endpoint: https://cache.kleinbem.dev/
        cache: system
        token: ${{ inputs.attic-token }}
